<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>수련회 애프터 · 크로스쿼트</title>

<!-- ✅ 여기에 Firebase 설정값을 붙여넣으세요 -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, updateDoc, collection,
    onSnapshot, addDoc, serverTimestamp, query, orderBy, arrayUnion, arrayRemove
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  /* ──────────────────────────────────────────
     🔧 여기에 Firebase 콘솔에서 복사한 설정값을 넣으세요
  ────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "AIzaSyDq4UNHnSlpnrHuznW_BvLlf_4JViD3UUU",
    authDomain:        "crossquat.firebaseapp.com",
    projectId:         "crossquat",
    storageBucket:     "crossquat.firebasestorage.app",
    messagingSenderId: "352163042512",
    appId:             "1:352163042512:web:29050d1e01f9c513e5bad5",
    measurementId:     "G-J5WS2XBZNM"
  };
  /* ────────────────────────────────────────── */

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  /* ═══════════════════════════════════════════
     상수 / 데이터
  ═══════════════════════════════════════════ */
  const SCHEDULE = [
    {w:1,d:20},{w:2,d:30},{w:3,d:40},{w:4,d:50},
    {w:5,d:60},{w:6,d:70},{w:7,d:85},{w:8,d:100}
  ];
  const VERSES = [
    {t:"내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라",r:"빌 4:13"},
    {t:"너는 마음을 다하여 여호와를 신뢰하고 네 명철을 의지하지 말라",r:"잠 3:5"},
    {t:"피곤한 자에게는 능력을 주시며 무능한 자에게는 힘을 더하시나니",r:"사 40:29"},
    {t:"우리가 선을 행하되 낙심하지 말지니 포기하지 아니하면 때가 이르매 거두리로다",r:"갈 6:9"},
    {t:"두려워하지 말라 내가 너와 함께 함이라 놀라지 말라 나는 네 하나님이 됨이라",r:"사 41:10"},
    {t:"시작은 미약하였으나 네 나중은 창대하리라",r:"욥 8:7"},
    {t:"여호와를 앙망하는 자는 새 힘을 얻으리니 독수리가 날개치며 올라감 같을 것이요",r:"사 40:31"},
  ];
  const ENCOURAGEMENTS = [
    "아직 오늘 미션 미완료! '우리가 선을 행하되 낙심하지 말지니 포기하지 아니하면 때가 이르매 거두리로다'(갈 6:9). 지금이 바로 그 때입니다!",
    "일어나세요! '너희 안에서 행하시는 이는 하나님이시니 자기의 기쁘신 뜻을 위하여 너희에게 소원을 두고 행하게 하시나니'(빌 2:13). 하나님이 이미 내 안에 힘을 두셨습니다.",
    "'내가 온 것은 양으로 생명을 얻게 하고 더 풍성히 얻게 하려는 것이라'(요 10:10). 이 작은 스쿼트도 풍성한 삶의 일부입니다. 함께 해요!",
  ];
  const BADGES = [
    {id:'first',  icon:'🌱', name:'첫 발걸음', desc:'첫날 완료',    cond:m=>m.completedDays>=1},
    {id:'streak3',icon:'⚡', name:'3연속',     desc:'3일 연속',    cond:m=>m.streak>=3},
    {id:'week1',  icon:'🔥', name:'1주 완주',  desc:'7일 연속',    cond:m=>m.streak>=7},
    {id:'week4',  icon:'💎', name:'한달 완주', desc:'28일 연속',   cond:m=>m.streak>=28},
    {id:'week8',  icon:'👑', name:'8주 완주',  desc:'56일 완료',   cond:m=>m.completedDays>=56},
    {id:'century',icon:'💯', name:'백개 달성', desc:'8주차 완료',  cond:m=>(m.done||[])[55]},
    {id:'social', icon:'💬', name:'응원단장',  desc:'댓글 3개 이상',cond:m=>(m.commentCount||0)>=3},
    {id:'comeback',icon:'🦅',name:'독수리',    desc:'쉰 후 재시작',cond:m=>m.hadMiss&&m.streak>=1},
  ];

  function getDailyTarget(day) {
    return SCHEDULE[Math.min(Math.ceil(day / 7), 8) - 1].d;
  }

  /* 챌린지 시작일: 실제 사용 시 원하는 날짜로 교체 */
  const CHALLENGE_START = new Date("2026-04-26");
  function getTodayDay() {
    const now = new Date();
    const diff = Math.floor((now - CHALLENGE_START) / (1000 * 60 * 60 * 24)) + 1;
    return Math.max(1, Math.min(diff, 56));
  }

  /* ═══════════════════════════════════════════
     앱 상태
  ═══════════════════════════════════════════ */
  let myName = localStorage.getItem("squat_name") || "";
  let myData = null;          // 내 Firestore 멤버 문서
  let allMembers = [];        // 실시간 멤버 목록
  let allComments = [];       // 실시간 댓글 목록
  let currentTab = "today";
  let toastTimer = null;
  let unsubMembers = null;
  let unsubComments = null;
  const TODAY = getTodayDay();

  /* ═══════════════════════════════════════════
     Firestore 헬퍼
  ═══════════════════════════════════════════ */
  function memberRef(name) { return doc(db, "members", name); }

  async function loadMember(name) {
    const snap = await getDoc(memberRef(name));
    return snap.exists() ? snap.data() : null;
  }

  function hashPin(pin) {
    let h = 0;
    for (let i = 0; i < pin.length; i++) {
      h = (Math.imul(31, h) + pin.charCodeAt(i)) | 0;
    }
    return String(h);
  }

  async function createMember(name, pin) {
    const data = {
      name,
      pinHash: hashPin(pin),
      done: Array(56).fill(false),
      streak: 0,
      completedDays: 0,
      total: 0,
      commentCount: 0,
      hadMiss: false,
      joinedAt: serverTimestamp(),
    };
    await setDoc(memberRef(name), data);
    return data;
  }

  function recalcStreak(done) {
    let s = 0;
    for (let i = TODAY - 2; i >= 0; i--) {
      if (done[i]) s++; else break;
    }
    return s;
  }

  /* ═══════════════════════════════════════════
     실시간 리스너 시작
  ═══════════════════════════════════════════ */
  function startListeners() {
    if (unsubMembers) unsubMembers();
    if (unsubComments) unsubComments();

    unsubMembers = onSnapshot(collection(db, "members"), snap => {
      allMembers = snap.docs.map(d => d.data());
      myData = allMembers.find(m => m.name === myName) || myData;
      renderApp();
    });

    unsubComments = onSnapshot(
      query(collection(db, "comments"), orderBy("createdAt", "desc")),
      snap => {
        allComments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderCommentList();
      }
    );
  }

  /* ═══════════════════════════════════════════
     액션
  ═══════════════════════════════════════════ */
  async function joinAs(name, pin) {
    name = name.trim();
    pin = (pin || "").trim();
    if (!name) { showToast("닉네임을 입력해주세요"); return; }
    if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) { showToast("4자리 숫자 비밀번호를 입력해주세요"); return; }
    showToast("연결 중...");
    let data = await loadMember(name);
    if (!data) {
      // 신규 가입
      data = await createMember(name, pin);
    } else {
      // 기존 멤버 - 비밀번호 확인
      if (data.pinHash && data.pinHash !== hashPin(pin)) {
        showToast("비밀번호가 맞지 않아요!");
        return;
      }
      // 비밀번호 없는 구 계정이면 설정
      if (!data.pinHash) {
        await updateDoc(memberRef(name), { pinHash: hashPin(pin) });
        data.pinHash = hashPin(pin);
      }
    }
    myName = name;
    myData = data;
    localStorage.setItem("squat_name", name);
    localStorage.setItem("squat_pin_" + name, hashPin(pin));
    startListeners();
    renderApp();
  }

  async function markDone() {
    if (!myData || myData.done[TODAY - 1]) return;
    const newDone = [...(myData.done || Array(56).fill(false))];
    newDone[TODAY - 1] = true;
    const newStreak = recalcStreak(newDone) + 1;
    const newTotal  = (myData.total || 0) + getDailyTarget(TODAY);
    const newCompleted = newDone.filter(Boolean).length;
    const updates = {
      done: newDone,
      streak: newStreak,
      total: newTotal,
      completedDays: newCompleted,
    };
    myData = { ...myData, ...updates };
    await updateDoc(memberRef(myName), updates);
    showToast(`완료! +${getDailyTarget(TODAY)}개 🎉`);
    setTimeout(showCelebration, 400);
    checkBadges();
  }

  function checkBadges() {
    const prev = myData.unlockedBadges || [];
    const now  = BADGES.filter(b => b.cond(myData)).map(b => b.id);
    const newOnes = now.filter(id => !prev.includes(id));
    if (newOnes.length > 0) {
      updateDoc(memberRef(myName), { unlockedBadges: now });
      const b = BADGES.find(b => b.id === newOnes[0]);
      if (b) setTimeout(() => showToast(`뱃지 획득! ${b.icon} ${b.name}`), 700);
    }
  }

  async function postComment() {
    const inp = document.getElementById("cInput");
    const txt = inp.value.trim();
    if (!txt || !myName) return;
    inp.value = "";
    await addDoc(collection(db, "comments"), {
      author: myName,
      text: txt,
      likes: 0,
      likedBy: [],
      createdAt: serverTimestamp(),
    });
    const newCount = (myData.commentCount || 0) + 1;
    myData.commentCount = newCount;
    await updateDoc(memberRef(myName), { commentCount: newCount });
    checkBadges();
  }

  async function toggleLike(commentId, likedBy) {
    if (!myName) return;
    const ref = doc(db, "comments", commentId);
    const liked = likedBy.includes(myName);
    await updateDoc(ref, {
      likedBy: liked ? arrayRemove(myName) : arrayUnion(myName),
      likes: (liked ? -1 : 1),
    });
    // likes는 likedBy.length로 표시하므로 숫자 필드 업데이트 생략 가능
  }

  /* ═══════════════════════════════════════════
     UI 헬퍼
  ═══════════════════════════════════════════ */
  function showToast(msg) {
    let t = document.getElementById("toast");
    if (!t) return;
    t.textContent = msg; t.style.opacity = "1";
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.opacity = "0"; }, 2800);
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    const sec = document.getElementById("tab-" + tab);
    const btn = document.getElementById("btn-" + tab);
    if (sec) sec.classList.add("active");
    if (btn) btn.classList.add("active");
  }

  /* ═══════════════════════════════════════════
     렌더링
  ═══════════════════════════════════════════ */
  function renderApp() {
    const root = document.getElementById("root");
    if (!myName || !myData) {
      root.innerHTML = renderOnboard();
      return;
    }
    root.innerHTML = `
      <div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f766e;color:#ffffff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid rgba(20,184,166,.3);"></div>
      ${renderHero()}
      <div class="tab-bar">
        <button id="btn-today"    class="tab-btn ${currentTab==='today'?'active':''}"    onclick="switchTab('today')">오늘</button>
        <button id="btn-rank"     class="tab-btn ${currentTab==='rank'?'active':''}"     onclick="switchTab('rank')">순위</button>
        <button id="btn-badges"   class="tab-btn ${currentTab==='badges'?'active':''}"   onclick="switchTab('badges')">뱃지</button>
        <button id="btn-comments" class="tab-btn ${currentTab==='comments'?'active':''}" onclick="switchTab('comments')">댓글</button>
      </div>
      <div id="tab-today"    class="section ${currentTab==='today'?'active':''}">   ${renderToday()}   </div>
      <div id="tab-rank"     class="section ${currentTab==='rank'?'active':''}">    ${renderRank()}    </div>
      <div id="tab-badges"   class="section ${currentTab==='badges'?'active':''}">  ${renderBadges()}  </div>
      <div id="tab-comments" class="section ${currentTab==='comments'?'active':''}"> ${renderCommentsSection()} </div>
    `;
  }

  function renderOnboard() {
    const chips = allMembers.length > 0
      ? `<p style="font-size:13px;color:#888;margin:.75rem 0 .4rem;">기존 참여자라면 이름을 눌러 바로 접속</p>
         <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">
           ${allMembers.map(m=>`<button class="chip" onclick="selectExistingName('${m.name}')">${m.name}</button>`).join("")}
         </div>` : "";

  function renderToday() {
    const done      = myData.done || Array(56).fill(false);
    const todayDone = done[TODAY - 1];
    const streak    = myData.streak || 0;

    const completed = done.filter(Boolean).length;
    const v         = VERSES[(TODAY - 1) % VERSES.length];

    const undoBtnHtml = '<button onclick="undoDone()" style="width:100%;margin-top:6px;padding:9px;background:none;border:1px solid #fca5a5;border-radius:10px;font-size:13px;color:#ef4444;cursor:pointer;font-family:inherit;">↩ 오늘 기록 취소</button>';
    const enc       = ENCOURAGEMENTS[(TODAY - 1) % ENCOURAGEMENTS.length];

    // 실제 날짜 캘린더 생성
    const START = new Date("2026-04-26");

    // 앞 빈칸
    for (let e = 0; e < startDow; e++) {
      cal += `<div class="d" style="visibility:hidden;"></div>`;
    }
    for (let i = 1; i <= 56; i++) {
      const cellDate = new Date(START);
      cellDate.setDate(START.getDate() + i - 1);
      const mo = cellDate.getMonth() + 1;
      const da = cellDate.getDate();
      let cls = "d future";
      let fire = "";
      if (i < TODAY) {
        cls = done[i-1] ? "d done" : "d missed";
        if (done[i-1] && i > 1 && done[i-2]) fire = ' title="🔥연속"';
      } else if (i === TODAY) cls = "d today";
      cal += `<div class="${cls}"${fire} style="flex-direction:column;gap:1px;">
        <span style="font-size:9px;opacity:.7;">${mo}/${da}</span>
        <span style="font-size:11px;">${getDailyTarget(i)}</span>
      </div>`;
    }
    cal += "</div>";

    const missingHtml = !todayDone && missing.length > 0 ? `
      <div class="warn-card">
        <div class="warn-title">아직 미완료 지체 — ${missing.map(m=>m.name).join(", ")}</div>
        <div class="warn-body">${enc}</div>
      </div>` : "";

    return `
      <div class="stat-row">
        <div class="stat-card"><div class="stat-num">${TODAY}</div><div class="stat-lbl">오늘 일차</div></div>
        <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-lbl">연속 완료</div></div>
        <div class="stat-card"><div class="stat-num">${completed}</div><div class="stat-lbl">완료 일수</div></div>
      </div>
      <div class="card">
        <div class="card-title">8주 캘린더</div>
        ${cal}
      </div>
      <button class="check-btn ${todayDone ? "done-btn" : ""}" onclick="markDone()" ${todayDone?"disabled":""}>
        ${todayDone ? "✓ 완료! 수고했습니다 (" + getDailyTarget(TODAY) + "개)" : "✓ 오늘 스쿼트 " + getDailyTarget(TODAY) + "개 완료하기"}
      </button>
      ${todayDone ? undoBtnHtml : ""}
      ${missingHtml}
      <div class="card" style="margin-top:.75rem;">
        <div class="card-title">오늘의 말씀</div>
        <div class="verse-block"><p>"${v.t}"</p><span>${v.r}</span></div>
      </div>`;
  }

  function renderRank() {
    const sorted  = [...allMembers].sort((a,b)=>(b.total||0)-(a.total||0)||(b.streak||0)-(a.streak||0));
    const missing = allMembers.filter(m => !(m.done||[])[TODAY-1]);
    const enc     = ENCOURAGEMENTS[(TODAY-1)%ENCOURAGEMENTS.length];
    const myRank  = sorted.findIndex(m=>m.name===myName)+1;

    const rows = sorted.map((m,i)=>{
      const cls   = ["","gold","silver","bronze"][i+1] || "other";
      const isMe  = m.name === myName;
      const earned= BADGES.filter(b=>b.cond(m)).map(b=>b.icon).slice(0,3).join("");
      return `
        <div class="rank-row ${isMe?"rank-me":""}">
          <div class="rank-num rank-${cls}">${i+1}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:500;color:#1e3a5f;">${m.name}${isMe?' <span style="color:#534AB7;font-size:11px;">(나)</span>':''}
              ${(m.streak||0)>=3 ? '<span class="fire-pill">🔥'+m.streak+'일</span>' : ""}
              <span style="font-size:13px;margin-left:3px;">${earned}</span>
            </div>
            <div style="font-size:11px;color:#94a3b8;">${(m.done||[]).filter(Boolean).length}일 완료 · 총 ${(m.total||0).toLocaleString()}개</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:15px;font-weight:700;color:#14b8a6;">#${i+1}</div>
          </div>
        </div>`;
    }).join("");

    const missingHtml = missing.length > 0
      ? `<div class="warn-card"><div class="warn-title">오늘 미완료 — ${missing.map(m=>m.name).join(", ")}</div><div class="warn-body">${enc}</div></div>`
      : `<div class="card" style="text-align:center;padding:1.25rem;border-left:3px solid #14b8a6;border-radius:0 14px 14px 0;background:#f0fdfa;"><div style="font-size:24px;">🙌</div><div style="font-size:14px;font-weight:600;color:#0d9488;margin-top:4px;">오늘 모두 완료!</div></div>`;

    return `
      <div class="card">
        <div style="display:flex;align-items:center;margin-bottom:.75rem;">
          <span class="live-dot"></span>
          <span style="font-size:13px;font-weight:500;">실시간 순위</span>
          <span style="font-size:11px;color:#888;margin-left:auto;">${allMembers.length}명 참여${myRank>0?" · 내 순위 #"+myRank:""}</span>
        </div>
        ${rows}
      </div>
      ${missingHtml}`;
  }

  function renderBadges() {
    const earned = BADGES.filter(b=>b.cond(myData)).map(b=>b.id);
    const grid   = BADGES.map(b=>{
      const ok = earned.includes(b.id);
      return `<div class="badge-cell${ok?" badge-earned":""}">
        <div style="font-size:22px;margin-bottom:4px;">${b.icon}</div>
        <div style="font-size:11px;font-weight:${ok?"600":"400"};color:${ok?"#0d9488":"#94a3b8"};">${b.name}</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:1px;">${b.desc}</div>
      </div>`;
    }).join("");

    const sched = SCHEDULE.map((s,i)=>{
      const curr = Math.ceil(TODAY/7)===i+1;
      const past = TODAY > s.w*7;
      return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid #eee;">
        <span style="background:rgba(20,184,166,.1);color:#0d9488;font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid rgba(20,184,166,.25);">${s.w}주</span>
        <span style="font-size:13px;flex:1;color:${curr?"#2dd4bf":past?"#334155":"#94a3b8"};font-weight:${curr?"600":"400"};">${s.d}개/일</span>
        <span style="font-size:12px;color:${past?"#0f766e":curr?"#14b8a6":"#1e3a4f"};">${past?"✓ 완료":curr?"진행중":"예정"}</span>
      </div>`;
    }).join("");

    const certBadgeHtml = myData && myData.completedDays >= 56 ? (
      "<div class=\"card\" style=\"background:#f0fdfa;border:1.5px solid #14b8a6;text-align:center;padding:1.5rem 1rem;\">" +
      "<div style=\"font-size:32px;margin-bottom:.4rem;\">👑</div>" +
      "<div style=\"font-size:16px;font-weight:700;color:#1e3a5f;margin-bottom:.3rem;\">8주 완주 달성!</div>" +
      "<div style=\"font-size:13px;color:#64748b;margin-bottom:1rem;\">완주 인증서를 다운로드 받으세요</div>" +
      "<button onclick=\"generateCertificate('" + (myData.name||'') + "'," + (myData.total||0) + "," + (myData.completedDays||0) + ")\" " +
      "style=\"padding:12px 28px;background:#14b8a6;color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;\">인증서 다운로드</button>" +
      "</div>"
    ) : "";

    return `
      <div class="card">
        <div class="card-title">내 뱃지 (${earned.length}/${BADGES.length})</div>
        <div class="badge-grid">${grid}</div>
      </div>
      ${certBadgeHtml}
      <div class="card">
        <div class="card-title">8주 로드맵</div>
        ${sched}
      </div>
      <div class="card" style="border:1px solid #fca5a5;">
        <div style="font-size:13px;font-weight:600;color:#1e3a5f;margin-bottom:.4rem;">내 기록 초기화</div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:.75rem;">모든 완료 기록이 삭제됩니다. 처음부터 다시 시작할 때 사용하세요.</div>
        <button onclick="resetMyData()" style="padding:9px 20px;background:none;border:1px solid #fca5a5;border-radius:8px;font-size:13px;color:#ef4444;cursor:pointer;font-family:inherit;">기록 초기화</button>
      </div>`;
  }

  function renderCommentsSection() {
    return `
      <div class="card">
        <div style="display:flex;gap:6px;margin-bottom:.75rem;">
          <input id="cInput" class="comment-inp" placeholder="응원 메시지를 남겨보세요!" maxlength="80"
            onkeydown="if(event.key==='Enter')postComment()" />
          <button onclick="postComment()" class="comment-btn">올리기</button>
        </div>
        <div id="commentListEl">${renderCommentItems()}</div>
      </div>`;
  }

  function renderCommentItems() {
    if (allComments.length === 0) return `<p style="font-size:13px;color:#aaa;text-align:center;padding:1rem;">아직 댓글이 없습니다. 첫 응원을 남겨보세요!</p>`;
    return allComments.map(c => {
      const liked = (c.likedBy||[]).includes(myName);
      const cnt   = (c.likedBy||[]).length;
      const timeStr = c.createdAt?.toDate ? c.createdAt.toDate().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) : "방금";
      return `
        <div style="padding:9px 0;border-bottom:1px solid #e8f0f8;">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;">
            <div style="width:26px;height:26px;border-radius:50%;background:rgba(20,184,166,.1);color:#14b8a6;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">${c.author.slice(-1)}</div>
            <span style="font-size:13px;font-weight:600;color:#e2e8f0;">${c.author}</span>
            <span style="font-size:11px;color:#94a3b8;margin-left:auto;">${timeStr}</span>
          </div>
          <div style="font-size:13px;color:#475569;padding-left:31px;line-height:1.5;margin-top:3px;">${c.text}</div>
          <div style="padding-left:31px;margin-top:4px;">
            <button onclick="toggleLike('${c.id}',${JSON.stringify(c.likedBy||[])})"
              style="background:none;border:none;font-size:12px;color:${liked?"#14b8a6":"#334155"};cursor:pointer;margin-left:31px;font-family:inherit;">
              ${liked?"♥":"♡"} ${cnt > 0 ? cnt : ""} 좋아요
            </button>
          </div>
        </div>`;
    }).join("");
  }

  function renderCommentList() {
    const el = document.getElementById("commentListEl");
    if (el) el.innerHTML = renderCommentItems();
  }

  /* ═══════════════════════════════════════════
     전역 노출 (onclick에서 사용)
  ═══════════════════════════════════════════ */

  const CELEB_MESSAGES = [
    { emoji: "🔥", title: "불타오르네!", msg: "오늘도 해냈습니다! 주님이 주신 몸으로 최선을 다하는 당신이 아름답습니다.", verse: '"피곤한 자에게는 능력을 주시며" — 사 40:29' },
    { emoji: "💪", title: "대단해요!", msg: "작은 습관이 큰 변화를 만듭니다. 오늘 하루도 승리했어요!", verse: '"내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라" — 빌 4:13' },
    { emoji: "👑", title: "크로스 챔피언!", msg: "포기하지 않는 것이 능력입니다. 공동체가 당신을 응원합니다!", verse: '"선을 행하되 낙심하지 말지니" — 갈 6:9' },
    { emoji: "✨", title: "눈부셔요!", msg: "오늘도 한 걸음 더! 8주 완주를 향해 힘차게 나아가고 있어요.", verse: '"시작은 미약하였으나 네 나중은 창대하리라" — 욥 8:7' },
    { emoji: "🙌", title: "할렐루야!", msg: "몸도 영혼도 함께 성장하는 당신! 오늘 완료 인증 완료!", verse: '"여호와를 앙망하는 자는 새 힘을 얻으리니" — 사 40:31' },
  ];

  function showCelebration() {
    const c = CELEB_MESSAGES[Math.floor(Math.random() * CELEB_MESSAGES.length)];
    // confetti
    const conf = document.createElement('div');
    conf.className = 'confetti';
    const colors = ['#14b8a6','#06b6d4','#fbbf24','#f472b6','#a78bfa','#34d399'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;border-radius:${Math.random()>0.5?'50%':'2px'};`;
      conf.appendChild(p);
    }
    document.body.appendChild(conf);

    // popup
    const overlay = document.createElement('div');
    overlay.className = 'celeb-overlay';
    overlay.innerHTML = `
      <div class="celeb-box">
        <span class="celeb-emoji">${c.emoji}</span>
        <div class="celeb-title">${c.title}</div>
        <div class="celeb-msg">${c.msg}</div>
        <div class="celeb-verse">${c.verse}</div>
        <button class="celeb-close" onclick="closeCelebration()">계속 달리기 🏃</button>
      </div>`;
    document.body.appendChild(overlay);
    window._celebOverlay = overlay;
    window._celebConf = conf;
    setTimeout(() => closeCelebration(), 6000);
  }

  function closeCelebration() {
    if (window._celebOverlay) { window._celebOverlay.remove(); window._celebOverlay = null; }
    if (window._celebConf) { window._celebConf.remove(); window._celebConf = null; }
  }


  function generateCertificate(name, total, completedDays) {
    const canvas = document.createElement('canvas');
    canvas.width = 1200;
    canvas.height = 800;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, 1200, 800);

    // Border
    ctx.strokeStyle = '#0d9488';
    ctx.lineWidth = 6;
    ctx.strokeRect(24, 24, 1152, 752);
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.strokeRect(36, 36, 1128, 728);

    // Corner decorations
    const corners = [[48,48],[1152,48],[48,752],[1152,752]];
    corners.forEach(([x,y]) => {
      ctx.fillStyle = '#14b8a6';
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI*2);
      ctx.fill();
    });

    // Top badge
    ctx.fillStyle = 'rgba(20,184,166,0.1)';
    ctx.beginPath();
    ctx.roundRect(500, 60, 200, 32, 16);
    ctx.fill();
    ctx.fillStyle = '#0d9488';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('수련회 애프터', 600, 82);

    // Main title
    ctx.fillStyle = '#1e3a5f';
    ctx.font = 'bold 64px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('크로스쿼트', 600, 180);

    ctx.fillStyle = '#64748b';
    ctx.font = '500 18px sans-serif';
    ctx.fillText('8-WEEK SQUAT CHALLENGE', 600, 215);

    // Divider
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(400, 240); ctx.lineTo(800, 240); ctx.stroke();
    ctx.fillStyle = '#14b8a6';
    ctx.beginPath(); ctx.arc(600, 240, 5, 0, Math.PI*2); ctx.fill();

    // Crown
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(540,270); ctx.lineTo(555,310); ctx.lineTo(600,285);
    ctx.lineTo(645,310); ctx.lineTo(660,270); ctx.lineTo(645,300);
    ctx.lineTo(600,270); ctx.lineTo(555,300); ctx.closePath();
    ctx.stroke();

    // Name
    ctx.fillStyle = '#94a3b8';
    ctx.font = '16px sans-serif';
    ctx.fillText('이 름', 600, 360);
    ctx.fillStyle = '#1e3a5f';
    ctx.font = 'bold 48px sans-serif';
    ctx.fillText(name, 600, 420);

    // Underline
    ctx.strokeStyle = '#14b8a6';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(350, 435); ctx.lineTo(850, 435); ctx.stroke();

    // Completion text
    ctx.fillStyle = '#64748b';
    ctx.font = '18px sans-serif';
    ctx.fillText('위 사람은 8주간의 스쿼트 챌린지를 완주하였기에 이 증서를 수여합니다.', 600, 475);

    // Verse
    ctx.fillStyle = '#0d9488';
    ctx.font = 'italic 15px sans-serif';
    ctx.fillText('"내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라" — 빌립보서 4:13', 600, 520);

    // Stats
    const stats = [
      {label:'총 스쿼트', value: total.toLocaleString()+'개'},
      {label:'완료 일수', value: completedDays+'일'},
      {label:'달성률', value:'100%'},
    ];
    stats.forEach((s, i) => {
      const x = 350 + i * 250;
      ctx.fillStyle = '#f1f5f9';
      ctx.beginPath(); ctx.roundRect(x-80, 560, 160, 60, 10); ctx.fill();
      ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(x-80, 560, 160, 60, 10); ctx.stroke();
      ctx.fillStyle = '#64748b'; ctx.font = '13px sans-serif';
      ctx.fillText(s.label, x, 582);
      ctx.fillStyle = i===2 ? '#f59e0b' : '#14b8a6';
      ctx.font = 'bold 20px sans-serif';
      ctx.fillText(s.value, x, 607);
    });

    // Date
    const now = new Date();
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.fillText(`${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`, 600, 680);

    // Download
    const link = document.createElement('a');
    link.download = `크로스쿼트_완주인증_${name}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }


  async function undoDone() {
    if (!myData || !myData.done[TODAY - 1]) return;
    if (!confirm("오늘 완료 기록을 취소할까요?")) return;
    const newDone = [...(myData.done || Array(56).fill(false))];
    newDone[TODAY - 1] = false;
    const removedAmt = getDailyTarget(TODAY);
    const newTotal = Math.max(0, (myData.total || 0) - removedAmt);
    const newStreak = recalcStreak(newDone);
    const newCompleted = newDone.filter(Boolean).length;
    const updates = { done: newDone, streak: newStreak, total: newTotal, completedDays: newCompleted };
    myData = { ...myData, ...updates };
    await updateDoc(memberRef(myName), updates);
    showToast("오늘 기록이 취소되었습니다");
    renderApp();
  }


  async function resetMyData() {
    if (!myData) return;
    if (!confirm("내 모든 기록을 초기화할까요? 이 작업은 되돌릴 수 없습니다.")) return;
    const resetData = {
      done: Array(56).fill(false),
      streak: 0,
      completedDays: 0,
      total: 0,
      commentCount: myData.commentCount || 0,
      hadMiss: false,
      unlockedBadges: [],
    };
    myData = { ...myData, ...resetData };
    await updateDoc(memberRef(myName), resetData);
    showToast("기록이 초기화되었습니다");
    renderApp();
  }


  function selectExistingName(name) {
    const nameInp = document.getElementById("nameInp");
    const pinInp = document.getElementById("pinInp");
    if (nameInp) { nameInp.value = name; }
    if (pinInp) { pinInp.focus(); }
  }

  window.joinAs      = joinAs;
  window.selectExistingName = selectExistingName;
  window.generateCertificate = generateCertificate;
  window.closeCelebration = closeCelebration;
  window.undoDone = undoDone;
  window.resetMyData = resetMyData;
  window.markDone    = markDone;
  window.switchTab   = switchTab;
  window.postComment = postComment;
  window.toggleLike  = toggleLike;

  /* ═══════════════════════════════════════════
     초기 실행
  ═══════════════════════════════════════════ */
  document.getElementById("root").innerHTML = `<p style="text-align:center;padding:3rem;color:#888;">Firebase 연결 중...</p>`;

  if (myName) {
    loadMember(myName).then(data => {
      if (data) {
        const savedHash = localStorage.getItem("squat_pin_" + myName);
        if (data.pinHash && savedHash !== data.pinHash) {
          // Pin mismatch - force re-login
          myName = "";
          localStorage.removeItem("squat_name");
          renderApp();
          return;
        }
        myData = data;
        startListeners();
      } else {
        myName = "";
        localStorage.removeItem("squat_name");
        renderApp();
      }
    });
  } else {
    // 온보딩 화면: 기존 멤버 목록 표시 위해 한 번 읽기
    onSnapshot(collection(db, "members"), snap => {
      allMembers = snap.docs.map(d => d.data());
      if (!myName) renderApp();
    });
  }
</script>

<style>

  .logo-sub { font-size: 10px; color: #0d9488; letter-spacing: .1em; margin-top: 1px; font-weight: 500; }

  /* Hero */
  .hero { background: #1e3a5f; border: 1px solid #2a4f7a; color: #e2e8f0; padding: 1.25rem; border-radius: 18px; margin-bottom: 1rem; }
  .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: .9rem; }
  .badge-pill { background: rgba(20,184,166,.15); border: 1px solid rgba(20,184,166,.35); color: #0d9488; border-radius: 999px; padding: 3px 12px; font-size: 11px; font-weight: 500; }
  .hero-greeting { font-size: 12px; color: #475569; }
  .hero-body { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-bottom: .75rem; }
  .hero-count { font-size: 72px; font-weight: 700; line-height: 1; color: #ffffff; }
  .hero-count-unit { font-size: 12px; color: rgba(255,255,255,.7); margin-top: 4px; }
  .hero-meta { font-size: 13px; line-height: 2.1; color: rgba(255,255,255,.85); }
  .progress-label { font-size: 11px; color: rgba(255,255,255,.6); margin-bottom: 5px; }
  .progress-track { background: rgba(255,255,255,.25); border-radius: 999px; height: 5px; overflow: hidden; }
  .progress-fill  { background: linear-gradient(90deg,#14b8a6,#06b6d4); height: 100%; border-radius: 999px; transition: width .5s; }

  /* Tabs */
  .tab-bar { display: flex; gap: 3px; background: #e2eaf3; border: 1px solid #c8d8ea; border-radius: 12px; padding: 3px; margin-bottom: 1rem; }
  .tab-btn { flex: 1; padding: 8px 4px; font-size: 12px; font-weight: 500; border: none; background: transparent; color: #64748b; border-radius: 9px; cursor: pointer; transition: all .2s; font-family: inherit; }
  .tab-btn.active { background: #14b8a6; color: #fff; font-weight: 700; }

  /* Sections */
  .section { display: none; } .section.active { display: block; }

  /* Cards */
  .card { background: #ffffff; border: 1px solid #dde8f0; border-radius: 16px; padding: 1rem 1.1rem; margin-bottom: .9rem; }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: .6rem; color: #94a3b8; }

  /* Stats */
  .stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: .9rem; }
  .stat-card { background: #ffffff; border: 1px solid #dde8f0; border-radius: 12px; padding: .75rem; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; color: #1e3a5f; }
  .stat-lbl { font-size: 11px; color: #94a3b8; margin-top: 2px; }

  /* Calendar */
  .cal-header { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-header div { text-align: center; font-size: 10px; color: #94a3b8; padding: 2px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin: 4px 0; }
  .d { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; cursor: default; border: 1px solid #1e3a4f; gap: 1px; color: #94a3b8; background: #f8fafc; }
  .d.done   { background: #0f766e; color: #ffffff; border-color: #0d6b63; }
  .d.today  { border: 2px solid #14b8a6; color: #0d9488; background: rgba(20,184,166,.08); }
  .d.missed { background: #fef2f2; color: #ef4444; border-color: #fca5a5; }
  .d.future { background: #f8fafc; color: #cbd5e1; }

  /* Check button */
  .check-btn { width: 100%; padding: 15px; background: #14b8a6; color: #fff; border: none; border-radius: 13px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; letter-spacing: .01em; }
  .check-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
  .done-btn { background: #0f766e !important; color: #2dd4bf !important; }

  /* Warning card */
  .warn-card { background: #fffbeb; border-radius: 0 12px 12px 0; border-left: 3px solid #ca8a04; border-radius: 0 12px 12px 0; padding: .85rem 1rem; margin: .75rem 0; }
  .warn-title { font-size: 12px; font-weight: 600; color: #fbbf24; margin-bottom: 4px; }
  .warn-body  { font-size: 12px; color: #78350f; line-height: 1.6; }

  /* Verse */
  .verse-block { border-left: 3px solid #14b8a6; padding: .7rem 1rem; background: #f0fdfa; border-radius: 0 10px 10px 0; }
  .verse-block p { font-size: 13px; color: #374151; line-height: 1.8; font-style: italic; }
  .verse-block span { font-size: 11px; color: #14b8a6; font-weight: 600; }

  /* Rank */
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #e8f0f8; }
  .rank-row:last-child { border-bottom: none; }
  .rank-me { background: #f0fdfa; border-radius: 10px; padding: 10px 8px; margin: 0 -8px; border: 1px solid rgba(20,184,166,.3); }
  .rank-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .rank-gold   { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.25); }
  .rank-silver { background: rgba(148,163,184,.12); color: #94a3b8; border: 1px solid rgba(148,163,184,.25); }
  .rank-bronze { background: rgba(180,120,80,.12); color: #cd8a5a; border: 1px solid rgba(180,120,80,.25); }
  .rank-other  { background: #f1f5f9; color: #94a3b8; }
  .rank-name { font-size: 14px; font-weight: 500; color: #1e3a5f; }
  .rank-sub { font-size: 11px; color: #94a3b8; }
  .fire-pill { background: #fffbeb; color: #d97706; font-size: 10px; padding: 2px 7px; border-radius: 999px; margin-left: 5px; border: 1px solid #fde68a; }

  /* Badges */
  .badge-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .badge-cell { text-align: center; padding: .7rem .25rem; border-radius: 12px; border: 1px solid #1e3a4f; background: #f8fafc; }
  .badge-earned { background: #f0fdfa; border-color: rgba(20,184,166,.4); }

  /* Onboard */
  .big-input { width: 100%; padding: 14px; border: 1.5px solid #1e3a4f; background: #f0f9ff; color: #1e3a5f; border-radius: 12px; font-size: 16px; text-align: center; margin-bottom: .75rem; outline: none; font-family: inherit; }
  .big-input:focus { border-color: #14b8a6; }
  .big-btn { width: 100%; padding: 15px; background: #14b8a6; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .chip { padding: 7px 16px; border: 1px solid #cbd5e1; border-radius: 999px; font-size: 13px; cursor: pointer; background: #ffffff; color: #64748b; font-family: inherit; }
  .chip:hover { border-color: #14b8a6; color: #0d9488; }

  /* Live dot */
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #14b8a6; display: inline-block; margin-right: 6px; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Comment */
  .comment-inp { flex: 1; padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; background: #ffffff; color: #1e3a5f; font-family: inherit; outline: none; }
  .comment-inp:focus { border-color: #14b8a6; }
  .comment-btn { padding: 9px 14px; background: #14b8a6; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; font-family: inherit; font-weight: 600; }

  /* Celebration popup */
  .celeb-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; animation: fadeIn .3s ease; }
  .celeb-box { background: #fff; border-radius: 24px; padding: 2rem 1.5rem; text-align: center; max-width: 300px; width: 90%; position: relative; animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
  .celeb-emoji { font-size: 56px; display: block; margin-bottom: .5rem; animation: bounce 1s infinite; }
  .celeb-title { font-size: 22px; font-weight: 700; color: #1e3a5f; margin-bottom: .4rem; }
  .celeb-msg { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 1.25rem; }
  .celeb-verse { background: #f0fdfa; border-left: 3px solid #14b8a6; border-radius: 0 10px 10px 0; padding: .6rem .9rem; font-size: 12px; color: #0d9488; font-style: italic; margin-bottom: 1.25rem; text-align: left; }
  .celeb-close { width: 100%; padding: 12px; background: #14b8a6; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1001; overflow: hidden; }
  .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: fall linear forwards; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes popIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
